<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Copy Tool</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e6e6e6;
    margin: 0;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 640px; }
  h1 { font-size: 20px; margin-bottom: 12px; }
  textarea {
    width: 100%;
    height: 130px;
    background: #1a1d27;
    color: #e6e6e6;
    border: 1px solid #2c2f3a;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #5b8def; }
  button.parse {
    margin-top: 10px;
    background: #5b8def;
    color: #fff;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  button.parse:hover { background: #4a7bd8; }
  .count { margin: 14px 0 6px; font-size: 13px; color: #9aa0ac; }
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1d27;
    border: 1px solid #2c2f3a;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s, border-color 0.2s;
  }
  li:hover { background: #232733; }
  li span { word-break: break-all; padding-right: 10px; }
  li .mark {
    flex-shrink: 0;
    font-size: 13px;
    color: #6b7280;
  }
  li.copied {
    background: #1e3b2b;
    border-color: #2f9e5b;
  }
  li.copied .mark {
    color: #4ade80;
    font-weight: bold;
  }
  .empty { color: #6b7280; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Email Copy Tool</h1>
  <textarea id="input" placeholder="Paste your emails here — one per line, or separated by commas/spaces"></textarea>
  <br>
  <button class="parse" onclick="parseEmails()">Parse Emails</button>

  <div class="count" id="count"></div>
  <ul id="list"></ul>
</div>

<script>
function parseEmails() {
  const raw = document.getElementById('input').value;
  const emails = [...new Set(
    raw.split(/[\s,;]+/).map(e => e.trim()).filter(e => e.includes('@'))
  )];

  const list = document.getElementById('list');
  const count = document.getElementById('count');
  list.innerHTML = '';

  if (emails.length === 0) {
    count.textContent = '';
    list.innerHTML = '<div class="empty">No emails found.</div>';
    return;
  }

  count.textContent = emails.length + ' email(s) found';

  emails.forEach(email => {
    const li = document.createElement('li');

    const span = document.createElement('span');
    span.textContent = email;

    const mark = document.createElement('span');
    mark.className = 'mark';
    mark.textContent = '';

    li.appendChild(span);
    li.appendChild(mark);
    li.onclick = () => copyEmail(email, li, mark);
    list.appendChild(li);
  });
}

let lastCopied = null;

function showCopied(li, mark) {
  if (lastCopied && lastCopied.li !== li) {
    lastCopied.li.classList.remove('copied');
    lastCopied.mark.textContent = '';
  }
  li.classList.add('copied');
  mark.textContent = '✓ Copied';
  lastCopied = { li, mark };
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try {
    ok = document.execCommand('copy');
  } catch (err) {
    ok = false;
  }
  document.body.removeChild(ta);
  return ok;
}

function copyEmail(email, li, mark) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(email)
      .then(() => showCopied(li, mark))
      .catch(() => {
        if (fallbackCopy(email)) showCopied(li, mark);
        else alert('Copy failed. Please copy manually: ' + email);
      });
  } else {
    if (fallbackCopy(email)) showCopied(li, mark);
    else alert('Copy failed. Please copy manually: ' + email);
  }
}
</script>
</body>
</html>

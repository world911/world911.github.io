function showEmails(list){

let html="";

list.forEach(email=>{

html+=`
<div class="email">

<button onclick="copyMail('${email}')">
Copy
</button>

</div>
`;

});

document.getElementById("emails").innerHTML=html;

}


function copyMail(email){

navigator.clipboard.writeText(email);

alert("Copied:\n"+email);

}



document.getElementById("search").addEventListener("input",function(){

});

<title>Bookmarks</title>

<style>
:root { --bg:#0f0f11; --surface:#1a1a1f; --border:#2a2a32; --accent:#7c6ef2; --text:#e8e8f0; --muted:#6b6b7e; --card-hover:#22222a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px;}
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse, rgba(124,110,242,0.12) 0%, transparent 70%);pointer-events:none;z-index:0;}
.container{width:100%;max-width:760px;position:relative;z-index:1;}
header{text-align:center;margin-bottom:48px;}
header h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-0.02em;background:linear-gradient(135deg,#e8e8f0 0%,#7c6ef2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
header p{font-size:0.85rem;color:var(--muted);font-weight:300;letter-spacing:0.05em;text-transform:uppercase;}
.search-wrap{margin-bottom:36px;position:relative;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px 12px 44px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);transition:background 0.18s,border-color 0.18s,transform 0.18s;animation:fadeUp 0.4s ease both;}
.card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-2px);}
.card img{width:28px;height:28px;border-radius:7px;flex-shrink:0;object-fit:contain;background:var(--border);}
.card-text{flex:1;min-width:0;}
.card-title{font-size:0.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.card-domain{font-size:0.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-arrow{color:var(--muted);flex-shrink:0;opacity:0;transition:opacity 0.18s;}
.card:hover .card-arrow{opacity:1;color:var(--accent);}
.section-label{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.hidden{display:none !important;}
.no-results{text-align:center;color:var(--muted);padding:40px 0;font-size:0.9rem;display:none;grid-column:1/-1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.count{display:inline-flex;align-items:center;justify-content:center;background:var(--border);color:var(--muted);border-radius:999px;font-size:0.68rem;padding:1px 7px;font-family:'DM Sans',sans-serif;font-weight:500;}
</style>
</head>
<body>
<div class="container">
<header><h1>My Bookmarks</h1><p>All bookmarks · <span id="total-count"></span> links</p></header>

const grid = document.getElementById('grid');
const totalCount = document.getElementById('total-count');
const visibleCount = document.getElementById('visible-count');
const searchInput = document.getElementById('search');
const noResults = document.getElementById('no-results');

totalCount.textContent = bookmarks.length;

function renderBookmarks(filter='') {
  grid.innerHTML = '';
  let visible = 0;
  bookmarks.forEach(b => {
    if (!b.title.toLowerCase().includes(filter.toLowerCase()) && !b.domain.toLowerCase().includes(filter.toLowerCase())) return;
    visible++;
    const card = document.createElement('a');
    card.href = b.url;
    card.target = '_blank';
    card.rel = 'noopener';
    card.className = 'card';
    card.innerHTML = `
      <img src='${b.img}' alt=''>
      <div class='card-text'>
        <div class='card-title'>${b.title}</div>
        <div class='card-domain'>${b.domain}</div>
      </div>
      <svg class='card-arrow' width='12' height='12' fill='none' stroke='currentColor' stroke-width='2' viewBox='0 0 24 24'><path d='M7 17L17 7M7 7h10v10'/></svg>
    `;
    grid.appendChild(card);
  });
  visibleCount.textContent = visible;
  noResults.style.display = visible ? 'none' : 'block';
}

searchInput.addEventListener('input', e => renderBookmarks(e.target.value));
renderBookmarks();
</script>
